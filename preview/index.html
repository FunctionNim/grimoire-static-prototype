const order = ["fn_stone","fn_black","fn_red","fn_white","fn_gold","fn_brown","fn_pink","fn_green","fn_purple","fn_blue"];
const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
function restorationFor(node) {
  const collapse = byId[node.collapseLinks?.[0]];
  const restoration = byId[node.restorationLinks?.[0]];
  return { collapse, restoration };
}
function renderStart() {
  app.innerHTML = `<section><p class="muted">Blue Threshold</p><h1>Welcome, traveler.</h1><p>This is a game of pressure, memory, building, questioning, restoration, and change.</p><p>You do not need to understand the whole Grimoire to begin.</p><button class="primary" onclick="renderRoad()">Begin Journey</button><button onclick="renderSophia()">Sophia Book</button><button onclick="renderWatcher()">Watcher Lens</button><button onclick="renderGratitude()">Leave for Now</button></section>`;
}
function renderRoad() {
  app.innerHTML = `<section><h1>Stone → Black → Red → White → Gold → Brown → Pink → Green → Purple → Blue</h1><p>Select one color to learn what it means.</p>${order.map((id,i)=>`<button class="node" onclick="renderNode('${id}')">${i+1}. ${byId[id].name} — ${byId[id].simpleMeaning}</button>`).join("")}<button onclick="renderStart()">Start</button></section>`;
}
function renderNode(id) {
  const node = byId[id];
  const { collapse, restoration } = restorationFor(node);
  app.innerHTML = `<section><p class="muted">${node.type}</p><h1>${node.name}</h1><p>${node.simpleMeaning}</p><h2>Medicine</h2><p>${node.medicine || "Not defined."}</p><h2>Poison</h2><p>${node.poison || "Not defined."}</p><h2>Collapse Risk</h2><p>${collapse ? collapse.name + " — " + collapse.simpleMeaning : "None linked."}</p><h2>Restoration Route</h2><p>${restoration ? restoration.name + " — " + restoration.simpleMeaning : "None linked."}</p><button onclick="renderSophia('${id}')">Sophia Book</button><button onclick="renderWatcher('${id}')">Watcher Lens</button><button onclick="renderRoad()">Back to Color Road</button></section>`;
}
function renderSophia(id) {
  const node = id ? byId[id] : null;
  const restoration = node ? restorationFor(node).restoration : null;
  app.innerHTML = `<section><p class="muted">Sophia Book</p><h1>Here is one way to continue.</h1><p>You may step back. You may return later.</p>${node ? `<h2>${node.name}</h2><p>${node.simpleMeaning}</p>` : ""}${restoration ? `<h2>Gentle Restoration Option</h2><p>${restoration.name} — ${restoration.simpleMeaning}</p>` : ""}<p class="muted">Sophia guides. Sophia does not command.</p><button onclick="${id ? `renderNode('${id}')` : "renderRoad()"}">Return</button></section>`;
}
function renderWatcher(id) {
  const node = id ? byId[id] : null;
  const route = node ? restorationFor(node) : {};
  app.innerHTML = `<section><p class="muted">Watcher Lens</p><h1>What happened still matters.</h1><p>The Watcher records consequence without command.</p>${node ? `<h2>Observed Node</h2><p>${node.name} — ${node.simpleMeaning}</p>` : ""}${route.collapse ? `<h2>Observed Risk</h2><p>${route.collapse.name} — ${route.collapse.simpleMeaning}</p>` : ""}${route.restoration ? `<h2>Restoration Still Visible</h2><p>${route.restoration.name} — ${route.restoration.simpleMeaning}</p>` : ""}<p class="muted">The Watcher records. The Watcher does not judge.</p><button onclick="${id ? `renderNode('${id}')` : "renderRoad()"}">Return</button></section>`;
}
function renderGratitude() {
  app.innerHTML = `<section><p class="muted">Blue Gratitude</p><h1>Thank you for traveling with us.</h1><p>Your road does not end because you step away.</p><strong>The road remains.</strong><br/><button class="primary" onclick="renderStart()">Return to Start</button></section>`;
}
